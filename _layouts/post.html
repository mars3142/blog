<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A front-end template that helps you build fast, modern mobile web apps.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} :: {{ site.name }}</title>

    <!-- Add to homescreen for Chrome on Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" sizes="192x192" href="images/touch/chrome-touch-icon-192x192.png">

    <!-- Add to homescreen for Safari on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="{{ site.name }}">
    <link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png">

    <!-- Tile icon for Win8 (144x144 + tile color) -->
    <meta name="msapplication-TileImage" content="images/touch/ms-touch-icon-144x144-precomposed.png">
    <meta name="msapplication-TileColor" content="#3372DF">

    <link href='//fonts.googleapis.com/css?family=Roboto:regular,bold,italic,thin,light,bolditalic,black,medium&amp;lang=en' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://storage.googleapis.com/code.getmdl.io/1.0.5/material.red-light_blue.min.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/stylesheets/style.css">
  </head>
  <body>
	<div class="demo-blog demo-blog--blogpost mdl-layout mdl-js-layout has-drawer is-upgraded">
      <main class="mdl-layout__content">
        <div class="demo-back">
          <a class="mdl-button mdl-js-button mdl-js-ripple-effect mdl-button--icon" href="{{ site.baseurl }}/" title="go back" role="button">
            <i class="material-icons" role="presentation">arrow_back</i>
          </a>
        </div>
        <div class="demo-blog__posts mdl-grid">
          <div class="mdl-card mdl-shadow--4dp mdl-cell mdl-cell--12-col" itemprop='blogPost' itemscope='itemscope' itemtype='http://schema.org/BlogPosting'>
            <div class="mdl-card__media mdl-color-text--grey-50" style="background-image: url('/images/{{ page.header }}')">
              <h3 itemprop='headline'>{{ page.title }}</h3>
            </div>
            <div class="mdl-color-text--grey-700 mdl-card__supporting-text meta">
              <div class="minilogo"></div>
              <div>
                <strong>Date created</strong>
                <span itemprop='dateCreated'>{{  page.date | date_to_string  }}</span>
              </div>
            </div>
            <div class="mdl-color-text--grey-700 mdl-card__supporting-text" itemprop='text'>
              {{ content }}
            </div>
            <div class="mdl-color-text--primary-contrast mdl-card__supporting-text comments" itemprop='comment'>
               <section id="comments">
               <script src="//apis.google.com/js/plusone.js" type="text/javascript"></script>
               <div class="g-comments" data-href="{{ site.url }}{{ page.url }}" data-width="820" data-first_party_property="BLOGGER" data-view_type="FILTERED_POSTMOD">Loading Google+ comments...</div>
            </div>
          </div>
        </div>
        <footer class="mdl-mini-footer">
          <div class="mdl-mini-footer--left-section">
            <a href="http://twitter.com/mars3142">
	          <button class="mdl-mini-footer--social-btn social-btn social-btn__twitter">
	            <span class="visuallyhidden">Twitter</span>
	          </button>
	        </a>
	        <a href="https://www.linkedin.com/in/petersiegmund">
	          <button class="mdl-mini-footer--social-btn social-btn social-btn__linkedin">
	            <span class="visuallyhidden">linkedIn</span>
	          </button>
	        </a>
            
            <a href="http://google.com/+PeterSiegmund">
	          <button class="mdl-mini-footer--social-btn social-btn social-btn__gplus">
	            <span class="visuallyhidden">Google Plus</span>
	          </button>
            </a>
          </div>
        </footer>
      </main>
      <div class="mdl-layout__obfuscator"></div>
    </div>
    <script src="https://storage.googleapis.com/code.getmdl.io/1.0.5/material.min.js"></script>

    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

        ga('create', 'UA-29150370-9', 'mars3142.org');
        ga('send', 'pageview');
    </script>

  </body>
</html>
