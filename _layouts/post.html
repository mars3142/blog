<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href='https://fonts.googleapis.com/css?family=Architects+Daughter' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" type="text/css" href="/stylesheets/stylesheet.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="/stylesheets/pygment_trac.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="/stylesheets/print.css" media="print" />

    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <title>{{ page.title }} :: {{ site.name }}</title>
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js" type="text/javascript"></script>
  </head>

  <body>
    <header>
      <div class="inner">
        <h1>Blog</h1>
        <h2></h2>
        <a href="https://github.com/mars3142/blog" class="button"><small>View project on</small>GitHub</a>
      </div>
    </header>

    <div id="content-wrapper">
      <div class="inner clearfix">
        <section id="main-content">
        <span class='date'>{{  post.date | date_to_string  }}</span>
        <h1>{{  post.title  }}</h1>
          {% if page.toc %}
            <ul data-toc="#main_content"></ul>
          {% endif %}
          {{ content }}
          <div id="comments">
          <section id="comments">
             <script src="//apis.google.com/js/plusone.js" type="text/javascript"></script>
             <div class="g-comments" data-href="{{ site.url }}{{ page.url }}" data-width="690" data-first_party_property="BLOGGER" data-view_type="FILTERED_POSTMOD">Loading Google+ comments...</div>
          </section>
          </div>
        </section>

        <aside id="sidebar">
          <a href="https://plus.google.com/+PeterSiegmund/about" rel="author">Find me on Google+</a>
        </aside>
      </div>
    </div>

    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

        ga('create', 'UA-29150370-9', 'mars3142.org');
        ga('send', 'pageview');
    </script>
  </body>
</html>
